<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Billing System</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 30px 16px;
    }

    .container {
      background: white;
      padding: 24px;
      width: 460px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      text-align: center;
    }

    h2 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 18px;
    }

    h3 {
      font-size: 14px;
      color: #444;
      margin: 14px 0 6px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      margin: 4px 0;
      border-radius: 7px;
      border: 1.5px solid #ddd;
      font-size: 14px;
    }

    input:focus {
      border-color: #007bff;
      outline: none;
    }

    .item-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .item-row input {
      margin: 0;
    }

    .remove-btn {
      background: #fee2e2;
      color: #dc3545;
      border: none;
      border-radius: 6px;
      width: 30px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .remove-btn:hover {
      background: #fecaca;
    }

    .btn {
      width: 100%;
      padding: 11px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-green {
      background: #28a745;
      color: white;
    }

    .btn-gray {
      background: #f0f2f5;
      color: #333;
    }

    #add-item-btn {
      display: inline-block;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      background: #e8f4fd;
      color: #007bff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 6px;
    }

    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0f7ff;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 12px 0;
    }

    .total-bar span {
      font-size: 13px;
      color: #666;
    }

    .total-bar strong {
      font-size: 20px;
      color: #007bff;
    }

    #status {
      margin: 10px 0;
      font-size: 13px;
      min-height: 20px;
      color: #555;
    }

    #status.error {
      color: #dc3545;
    }

    #status.success {
      color: #28a745;
    }

    #result-area {
      display: none;
      margin-top: 16px;
    }

    #result-area.show {
      display: block;
    }

    .result-card {
      background: #f9fafb;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px;
    }

    #qrcode {
      margin: 10px auto;
      display: inline-block;
    }

    .view-btn {
      display: block;
      margin-top: 12px;
      padding: 10px;
      background: #007bff;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #007bff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .col-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 6px;
      margin-bottom: 4px;
    }

    .col-header span {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .qr-note {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>☁️ QR Billing System</h2>

  <input type="text" id="customer" placeholder="Customer Name">
  <input type="text" id="phone" placeholder="Phone (91XXXXXXXXXX)">
  <input type="date" id="date">

  <h3>Items</h3>

  <div class="col-header">
    <span>Item</span>
    <span>Price ₹</span>
    <span>Qty</span>
    <span></span>
  </div>

  <div id="items"></div>

  <button type="button" id="add-item-btn">+ Add Item</button>

  <div class="total-bar">
    <span>Total Amount</span>
    <strong>₹ <span id="total">0.00</span></strong>
  </div>

  <button type="button" class="btn btn-green" id="generate-btn">
    Generate Bill & QR
  </button>

  <button type="button" class="btn btn-gray" id="download-btn">
    Download PDF
  </button>

  <div id="status"></div>

  <div id="result-area">
    <div class="result-card">
      <p style="font-size:13px;color:#666;margin-bottom:6px;">
        Scan QR from <strong>any device</strong> 🌐
      </p>

      <div id="qrcode"></div>

      <p class="qr-note">🔒 Stored securely in Firebase</p>

      <button type="button" class="view-btn" id="view-btn">
        View Invoice
      </button>
    </div>
  </div>

</div>

<script>
(function () {

  var FIREBASE_CONFIG = {
   apiKey: "AIzaSyAvUR8hQ1VWAW3EezoAeOWW7S9lWXrAEvI",
  authDomain: "qr-bill--system.firebaseapp.com",
  databaseURL: "https://qr-bill--system-default-rtdb.firebaseio.com",
  projectId: "qr-bill--system",
  storageBucket: "qr-bill--system.firebasestorage.app",
  messagingSenderId: "437865614962",
  appId: "1:437865614962:web:632f477e243004aaca3ceb"
  };

  var INVOICE_URL = "https://crockroaksh.github.io/qr-billing/invoice.html";

  firebase.initializeApp(FIREBASE_CONFIG);
  var db = firebase.firestore();

  var currentInvoiceURL = null;

  function setStatus(msg, type) {
    var el = document.getElementById("status");
    el.className = type || "";
    el.innerHTML = msg;
  }

  function calculateTotal() {
    var total = 0;

    document.querySelectorAll(".item-row").forEach(function (row) {
      total +=
        (parseFloat(row.querySelector(".price-input").value) || 0) *
        (parseFloat(row.querySelector(".qty-input").value) || 0);
    });

    document.getElementById("total").textContent = total.toFixed(2);
  }

  function getItems() {
    var items = [];

    document.querySelectorAll(".item-row").forEach(function (row) {
      var name = row.querySelector(".name-input").value.trim();
      var price = parseFloat(row.querySelector(".price-input").value);
      var qty = parseFloat(row.querySelector(".qty-input").value);

      if (name && !isNaN(price) && !isNaN(qty) && price > 0 && qty > 0) {
        items.push({
          name: name,
          price: price,
          qty: qty,
          total: +(price * qty).toFixed(2)
        });
      }
    });

    return items;
  }

  function addItem() {
    var div = document.createElement("div");
    div.className = "item-row";

    var nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.className = "name-input";
    nameInput.placeholder = "Item name";

    var priceInput = document.createElement("input");
    priceInput.type = "number";
    priceInput.className = "price-input";
    priceInput.placeholder = "0";
    priceInput.min = "0";
    priceInput.step = "0.01";
    priceInput.addEventListener("input", calculateTotal);

    var qtyInput = document.createElement("input");
    qtyInput.type = "number";
    qtyInput.className = "qty-input";
    qtyInput.placeholder = "1";
    qtyInput.value = "1";
    qtyInput.min = "1";
    qtyInput.addEventListener("input", calculateTotal);

    var removeBtn = document.createElement("button");
    removeBtn.className = "remove-btn";
    removeBtn.textContent = "×";

    removeBtn.addEventListener("click", function () {
      if (document.querySelectorAll(".item-row").length > 1) {
        div.remove();
      } else {
        nameInput.value = "";
        priceInput.value = "";
        qtyInput.value = "1";
      }

      calculateTotal();
    });

    div.appendChild(nameInput);
    div.appendChild(priceInput);
    div.appendChild(qtyInput);
    div.appendChild(removeBtn);

    document.getElementById("items").appendChild(div);
    nameInput.focus();
  }

  function buildPDF(customer, date, items) {
    var doc = new window.jspdf.jsPDF();
    var total = 0;

    doc.setFontSize(20);
    doc.text("INVOICE", 105, 20, { align: "center" });

    doc.setFontSize(12);
    doc.text("Customer: " + customer, 14, 40);
    doc.text("Date: " + date, 14, 48);

    var y = 65;

    items.forEach(function (item) {
      doc.text(
        item.name + " | ₹" + item.price + " x " + item.qty,
        14,
        y
      );

      total += item.total;
      y += 10;
    });

    doc.setFontSize(14);
    doc.text("Grand Total: ₹" + total.toFixed(2), 14, y + 10);

    return doc;
  }

  function generateBill() {
    var customer = document.getElementById("customer").value.trim();
    var phone = document.getElementById("phone").value.trim();
    var date = document.getElementById("date").value;
    var items = getItems();

    if (!customer) {
      setStatus("Enter customer name", "error");
      return;
    }

    if (items.length === 0) {
      setStatus("Add at least one item", "error");
      return;
    }

    document.getElementById("result-area").classList.remove("show");
    setStatus('<span class="spinner"></span>Saving to Firebase...');

    var grandTotal = items.reduce(function (sum, item) {
      return sum + item.total;
    }, 0);

    db.collection("bills").add({
      customer: customer,
      phone: phone,
      date: date,
      items: items,
      total: grandTotal,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(function (docRef) {
      var invoiceURL = INVOICE_URL + "?bill=" + docRef.id;
      currentInvoiceURL = invoiceURL;

      var qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML = "";

      QRCode.toCanvas(invoiceURL, {
        width: 200,
        margin: 2,
        errorCorrectionLevel: "M"
      }, function (err, canvas) {
        if (err) {
          setStatus("QR Error: " + err.message, "error");
          return;
        }

        qrContainer.appendChild(canvas);
        document.getElementById("result-area").classList.add("show");
        setStatus("Bill saved successfully!", "success");
      });
    })
    .catch(function (err) {
      console.error(err);
      setStatus(err.message, "error");
    });
  }

  function viewInvoice() {
    if (!currentInvoiceURL) {
      setStatus("Generate a bill first", "error");
      return;
    }

    window.open(currentInvoiceURL, "_blank");
  }

  function downloadPDF() {
    var customer = document.getElementById("customer").value.trim() || "Customer";
    var date = document.getElementById("date").value || "";
    var items = getItems();

    if (items.length === 0) {
      setStatus("Add items first", "error");
      return;
    }

    var blob = buildPDF(customer, date, items).output("blob");
    var url = URL.createObjectURL(blob);

    var a = document.createElement("a");
    a.href = url;
    a.download = "invoice_" + Date.now() + ".pdf";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);

    setStatus("PDF downloaded!", "success");
  }

document.getElementById("add-item-btn").addEventListener("click", addItem);
document.getElementById("generate-btn").addEventListener("click", generateBill);
document.getElementById("download-btn").addEventListener("click", downloadPDF);
document.getElementById("view-btn").addEventListener("click", viewInvoice);

document.getElementById("date").valueAsDate = new Date();

addItem(); // creates first item row automatically

})();

</body>
</html>
